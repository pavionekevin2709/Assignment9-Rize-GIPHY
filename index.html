<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giphy Fetcher</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Your custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="text-center mb-5">
            <h1 class="display-4 fw-bold text-primary">🎉 Giphy Fetcher</h1>
            <p class="lead text-muted">Search and fetch awesome GIFs from Giphy!</p>
        </div>

        <div class="row justify-content-center mb-4">
            <div class="col-md-8">
                <div class="input-group">
                    <input type="text" 
                           id="search-input" 
                           class="form-control form-control-lg" 
                           placeholder="Search for GIFs... (e.g. cat, dinosaur, funny)">
                    <button id="fetch-gif-btn" 
                            class="btn btn-primary btn-lg">
                        Fetch GIFs
                    </button>
                </div>
            </div>
        </div>

        <!-- Container where GIFs will appear -->
        <div id="gif-container" class="row">
            <!-- JavaScript will insert GIFs here -->
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Your JavaScript -->
    <script src="script.js"></script>
</body>
</html>
